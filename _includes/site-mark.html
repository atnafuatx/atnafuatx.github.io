<!--
  Site monogram — five small nodes (representing languages / corpora)
  connected by curves to a central node (a multilingual model).
  Drawn at 22×22 in the header but the SVG is viewBox-driven so it
  scales to any size.
-->
<svg class="mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-label="site mark" role="img">
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
    <path d="M5 8 Q12 14 16 16" />
    <path d="M5 24 Q12 18 16 16" />
    <path d="M27 8 Q20 14 16 16" />
    <path d="M27 24 Q20 18 16 16" />
    <path d="M16 4 Q16 10 16 16" />
  </g>
  <g fill="currentColor">
    <circle cx="5"  cy="8"  r="1.6"/>
    <circle cx="5"  cy="24" r="1.6"/>
    <circle cx="27" cy="8"  r="1.6"/>
    <circle cx="27" cy="24" r="1.6"/>
    <circle cx="16" cy="4"  r="1.6"/>
  </g>
  <circle cx="16" cy="16" r="2.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
</svg>
